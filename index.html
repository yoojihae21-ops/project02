<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>project02</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .main {
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .main_img {
            display: block;
            width: 100%;
            height: auto;
        }

        .obj {
            position: absolute;
            top: 180px;
            right: 80px;
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }

            100% {
                transform: translateY(0);
            }
        }

        .mo {
            display: none;
        }

        @media (max-width: 768px) {
            .mo {
                display: block;
            }

            .pc {
                display: none;
            }

            .obj {
                width: 430px;
                position: absolute;
                top: 9.7%;
                left: 50%;
                animation: floating 4s ease-in-out infinite;
            }

            @keyframes floating {
                0% {
                    transform: translateX(-50%) translateY(0) rotate(10deg);
                }

                50% {
                    transform: translateX(-50%) translateY(-20px) rotate(10deg);
                }

                100% {
                    transform: translateX(-50%) translateY(0) rotate(10deg);
                }
            }
        }
    </style>
</head>

<body>
    <div class="pc">
        <div class="main">
            <img src="./img/obj.png" alt="" class="obj">
            <img src="./img/may.jpg" alt="" class="main_img">
        </div>
    </div>

    <div class="mo">
        <div class="main">
            <img src="./img/obj.png" alt="" class="obj">
            <img src="./img/may_mo.jpg" alt="" class="main_img">
        </div>
    </div>

    <script>
        if (window.innerWidth > 768) {
            // 900px 스크롤 적용
            let isScrolling = false;

            window.addEventListener('wheel', (e) => {
                e.preventDefault();

                if (isScrolling) return;
                isScrolling = true;

                const move = e.deltaY > 0 ? 900 : -900;

                window.scrollBy({
                    top: move,
                    behavior: 'smooth'
                });

                setTimeout(() => {
                    isScrolling = false;
                }, 500);
            }, { passive: false });
        }
    </script>
</body>

</html>
